<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO AI Chat Interface</title>
<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #fff;
}.container { display: flex; flex-direction: column; height: 100vh; }

/* Header */ .header { padding: 15px; text-align: center; font-size: 20px; font-weight: bold; background: #020617; border-bottom: 1px solid #1e293b; }

/* Chat Area */ .chat-area { flex: 1; padding: 20px; overflow-y: auto; }

.message { max-width: 70%; padding: 12px 16px; margin-bottom: 15px; border-radius: 12px; line-height: 1.4; }

.user { background: #2563eb; margin-left: auto; }

.bot { background: #1e293b; }

/* Input Area */ .input-area { padding: 15px; background: #020617; border-top: 1px solid #1e293b; }

.input-box { display: flex; align-items: center; background: #1e293b; border-radius: 12px; padding: 10px; }

.input-box textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; font-size: 14px; }

.icon-btn { background: none; border: none; color: #94a3b8; font-size: 18px; cursor: pointer; margin: 0 5px; }

.send-btn { background: #22c55e; border: none; padding: 8px 14px; border-radius: 8px; color: white; cursor: pointer; }

.send-btn:hover { background: #16a34a; }

/* Suggestions */ .suggestions { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

.suggestion { background: #1e293b; padding: 8px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; }

.suggestion:hover { background: #334155; }

/* File Upload */ input[type="file"] { display: none; }

</style>
</head>
<body><div class="container"><div class="header">NGO AI Assistant</div>

<div class="chat-area" id="chat">

    <div class="suggestions">
        <div class="suggestion" onclick="fillText('How can I volunteer?')">How can I volunteer?</div>
        <div class="suggestion" onclick="fillText('Donate process')">Donate process</div>
        <div class="suggestion" onclick="fillText('Upcoming events')">Upcoming events</div>
    </div>

    <div class="message bot">Welcome! Please enter your name to continue.</div>

</div>

<div class="input-area">
    <div class="input-box">
        <label class="icon-btn">
            📎
            <input type="file" onchange="uploadFile(event)">
        </label>

        <textarea id="messageInput" rows="1" placeholder="Enter your name..."></textarea>

        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

</div><script>
let currentUsername = "";
let currentUniqueId = "";
let isLoggedIn = false;

function getCurrentDateTime() {
    let now = new Date();
    return now.getFullYear() + "-" + 
           String(now.getMonth() + 1).padStart(2, '0') + "-" + 
           String(now.getDate()).padStart(2, '0') + " " + 
           String(now.getHours()).padStart(2, '0') + ":" + 
           String(now.getMinutes()).padStart(2, '0') + ":" + 
           String(now.getSeconds()).padStart(2, '0');
}

function sendMessage() {
    let input = document.getElementById('messageInput');
    let text = input.value.trim();
    if(text === '') return;

    let chat = document.getElementById('chat');

    let userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.innerText = text;
    chat.appendChild(userMsg);

    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    let typingMsg = document.createElement('div');
    typingMsg.className = 'message bot';
    typingMsg.innerText = 'Processing...';
    chat.appendChild(typingMsg);
    chat.scrollTop = chat.scrollHeight;

    if (!isLoggedIn) {
        // --- API 1: INIT ---
        currentUsername = text;
        let payload = {
            "method": "init_lms",
            "username": currentUsername,
            "reqdatetime": getCurrentDateTime()
        };

        fetch('/api/init', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            chat.removeChild(typingMsg);
            currentUniqueId = data.uniqueid;
            isLoggedIn = true;
            document.getElementById('messageInput').placeholder = "Ask a question...";
            
            let botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            botMsg.innerText = "Thanks " + data.username + "! How can I help you today?"; 
            chat.appendChild(botMsg);
            chat.scrollTop = chat.scrollHeight;
        })
        .catch(error => {
            chat.removeChild(typingMsg);
            let errorMsg = document.createElement('div');
            errorMsg.className = 'message bot';
            errorMsg.innerText = 'Error: ' + error.message;
            errorMsg.style.color = '#ff6b6b';
            chat.appendChild(errorMsg);
        });
    } else {
        // --- API 2: QUESTION ---
        let payload = {
            "method": "init_lms_question",
            "username": currentUsername,
            "uniqueid": currentUniqueId,
            "question": text,
            "reqdatetime": getCurrentDateTime()
        };

        fetch('/api/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            chat.removeChild(typingMsg);
            let botMsg = document.createElement('div');
            botMsg.className = 'message bot';
            botMsg.innerText = data.response;
            chat.appendChild(botMsg);
            chat.scrollTop = chat.scrollHeight;
        })
        .catch(error => {
            chat.removeChild(typingMsg);
            let errorMsg = document.createElement('div');
            errorMsg.className = 'message bot';
            errorMsg.innerText = 'Error: Could not connect to knowledge base.';
            errorMsg.style.color = '#ff6b6b';
            chat.appendChild(errorMsg);
        });
    }
}

function fillText(text) {
    document.getElementById('messageInput').value = text;
}

function uploadFile(event) {
    let file = event.target.files[0];
    if(file) {
        let chat = document.getElementById('chat');
        let fileMsg = document.createElement('div');
        fileMsg.className = 'message user';
        fileMsg.innerText = 'Uploaded: ' + file.name;
        chat.appendChild(fileMsg);
        chat.scrollTop = chat.scrollHeight;
    }
}
</script></body>
</html>
